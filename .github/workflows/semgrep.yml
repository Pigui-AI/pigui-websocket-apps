name: Semgrep

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep CE
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          EXIT_CODE=0
          semgrep scan \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/kotlin \
            --config p/swift \
            --config p/dockerfile \
            --config p/terraform \
            --json \
            --output semgrep.json \
            . || EXIT_CODE=$?
          semgrep scan \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/kotlin \
            --config p/swift \
            --config p/dockerfile \
            --config p/terraform \
            --sarif \
            --output semgrep.sarif \
            . || true
          exit "$EXIT_CODE"

      - name: Upload Semgrep artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-${{ github.ref_name }}-${{ github.sha }}
          path: |
            semgrep.json
            semgrep.sarif
          if-no-files-found: error

      - name: Fail workflow on Semgrep findings
        if: steps.semgrep.outcome == 'failure'
        run: exit 1
